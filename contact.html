<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusGuide 2026 - Events & Clubs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>    
        <h1>Contact</h1>
        <p>Lets get in touch for registration and more info</p>
    </header>
    
    <nav aria-label="Main navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="content.html">Events</a></li>
            <li><a href="data.html">Schedule</a></li>
            <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
    </nav>

    <main id="main-content">
        <section>
            <h2>Send Us a Message</h2>

            <form action="#" method="post" aria-label="Contact form">
                <fieldset>
                    <legend>Personal Information</legend>
                    <div>
                        <label for="name">Full Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div>
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="faculty">Faculty:</label>
                        <input type="text" id="faculty" name="faculty" required>
                    </div>
                    <div>
                        <label for="year">Year:</label>
                        <select name="year" id="year" required>
                            <option value="">--Select a year--</option>
                            <option value="1">Year 1</option>
                            <option value="2">Year 2</option>
                            <option value="3">Year 3</option>
                            <option value="above">Master/Phd student</option>
                        </select>
                    </div>

                </fieldset>

                <fieldset>
                    <legend>Message Details</legend>

                    <div>
                        <label for="subject">Subject:</label>
                        <select id="subject" name="subject" required>
                            <option value="">--Select a topic--</option>
                            <option value="event">Event Inquiry</option>
                            <option value="registration">Registration</option>
                            <option value="feedback">General Feedback</option>
                        </select>
                    </div>

                    <div>
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>

                    <div class="subscribe-container">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Subscribe to updates</label>
                    </div>
                </fieldset>

                <div>
                    <button type="submit">Submit</button>
                </div>

            </form>
        </section>

    </main>
    
    <footer>
                <p>&copy; 2026 CampusGuide | Created for Web Development Assignment BY ADNAN</p>
    </footer>
</body>
</html>
